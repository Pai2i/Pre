<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM PLAY STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-white: #ffffff;
            --primary-red: #ff0000;
            --dark-gray: #333333;
            --light-gray: #f4f4f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background: var(--bg-white); 
            color: var(--dark-gray); 
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
            position: relative;
        }

        /* 🌸 SVG লতা-পাতা ডিজাইন (লাল রঙের) */
        .floral {
            position: fixed;
            width: 250px;
            height: 250px;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 80px; right: 0; transform: rotate(180deg); }

        header { 
            padding: 30px 15px; 
            text-align: center; 
            background: var(--primary-red);
            color: var(--white);
        }

        .header-title {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: white;
        }

        /* 🔎 সার্চ বক্স */
        .search-container {
            display: flex;
            background: var(--light-gray);
            border-radius: 50px;
            padding: 6px 6px 6px 20px;
            max-width: 90%;
            margin: 0 auto;
            border: 1px solid #ddd;
        }

        .search-container input {
            background: transparent; border: none; color: #000; flex: 1; outline: none; font-size: 16px;
        }

        .search-btn {
            background: var(--primary-red); color: #fff; border: none;
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
        }

        /* 📱 অ্যাপ কার্ড ডিজাইন */
        .page { padding: 20px; display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .app-item { 
            background: #fff; 
            padding: 18px; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 18px;
            border: 1px solid #eee;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .app-item img { width: 70px; height: 70px; border-radius: 18px; border: 1px solid #eee; }
        .app-content { margin-left: 15px; flex: 1; }
        .app-content h4 { font-size: 18px; font-weight: 700; color: var(--primary-red); }
        .app-content p { font-size: 12px; opacity: 0.7; color: #000; }

        .fa-download { color: var(--primary-red); font-size: 20px; }

        /* 📍 ডাউনলোড ডিটেইলস পেজ */
        .feature-card {
            background: var(--light-gray);
            padding: 12px; border-radius: 15px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid #eee;
            text-align: left;
        }

        .download-btn {
            background: var(--primary-red); color: white;
            text-align: center; padding: 18px; border-radius: 50px;
            text-decoration: none; font-weight: 900; display: block;
            margin-top: 25px; text-transform: uppercase;
        }

        /* 📍 নিচের মেনু বার */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 12px; flex: 1; cursor: pointer;}
        .nav-btn i { font-size: 24px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--primary-red); font-weight: bold; }
    </style>
</head>
<body>

<svg class="floral top-left" viewBox="0 0 200 200" fill="red">
    <path d="M0,0 Q50,0 50,50 T100,100 M0,50 Q25,50 25,75 T50,100 M50,0 Q50,25 75,25 T100,50" stroke="red" stroke-width="2" fill="none"/>
</svg>

<header id="main-header">
    <div class="header-title">PREMIUM PLAY STORE</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search premium apps...">
        <button class="search-btn" onclick="executeSearch()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div id="home" class="page active">
    <h3 style="margin-bottom: 20px; color: var(--primary-red);">Top Recommended</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is the best video editor with all premium features unlocked.', 'https://github.com/Pai2i/Pre/releases/download/1v1/CapCut_Pro.Premium_App_Store.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB</p></div>
            <i class="fas fa-download"></i>
        </div>
    </div>
</div>

<div id="apps" class="page">
    <h3 style="margin-bottom: 20px; color: var(--primary-red);">Premium Apps</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is the best video editor with all premium features unlocked.', 'https://github.com/Pai2i/Pre/releases/download/1v1/CapCut_Pro.Premium_App_Store.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB</p></div>
            <i class="fas fa-download"></i>
        </div>
    </div>
</div>

<div id="games" class="page">
    <h3 style="margin-bottom: 20px; color: var(--primary-red);">Premium Games</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('Asphalt 8 Pro', '2.5GB', 'https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Asphalt_8_Airborne_Logo.jpg/220px-Asphalt_8_Airborne_Logo.jpg', 'Asphalt 8 Pro: The best arcade racing game with all cars unlocked.', 'https://github.com/Pai2i/Pre/releases/download/1v2/Asphalt.8.Pro_Premium_App_Store.apk')">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Asphalt_8_Airborne_Logo.jpg/220px-Asphalt_8_Airborne_Logo.jpg">
            <div class="app-content"><h4>Asphalt 8 Pro</h4><p>Mod Menu • 2.5 GB</p></div>
            <i class="fas fa-download"></i>
        </div>
    </div>
</div>

<div id="details-page" class="page">
    <i class="fas fa-arrow-left" style="font-size: 24px; cursor: pointer; margin-bottom: 20px; color: var(--primary-red);" onclick="switchTab('home', document.getElementById('home-btn'))"></i>
    <div style="text-align: center;">
        <img id="app-icon" src="" style="width: 100px; height: 100px; border-radius: 20px; border: 2px solid #eee;">
        <h2 id="app-name" style="margin-top: 15px; color: var(--primary-red);"></h2>
        <div class="feature-list">
            <div class="feature-card"><i class="fas fa-check-circle" style="color:red;"></i> Network Error Fix.</div>
            <div class="feature-card"><i class="fas fa-check-circle" style="color:red;"></i> All devices Working.</div>
            <div class="feature-card"><i class="fas fa-check-circle" style="color:red;"></i> Prem!um Features Unl0cked.</div>
            <div class="feature-card"><i class="fas fa-check-circle" style="color:red;"></i> Ads Rem0ve.</div>
        </div>
        <a href="" id="download-link" class="download-btn">Download Now</a>
    </div>
</div>

<nav class="bottom-nav">
    <button id="home-btn" class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-th-large"></i><span>Apps</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        window.scrollTo(0,0);
    }

    function openDetails(name, size, icon, desc, link) {
        document.getElementById('app-name').innerText = name;
        document.getElementById('app-icon').src = icon;
        document.getElementById('download-link').href = link;
        switchTab('details-page');
    }

    function executeSearch() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.app-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
